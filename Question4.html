<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Temperature Recording System</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

      <div class="col-lg-5 col-md-7 col-9 mx-auto p-lg-5 p-3 border-3 shadow mt-lg-6 mt-3">
            <h3> Temperature Check</h3>
            <div id="errorMsg" style="display: none;" class="alert alert-danger text-center p-2 fw-bold fs-6">input
                  cannot be empty</div>
            <input class="form-control form-control-sm shadow-none my-2" id="temperature" type="number"
                  placeholder="Enter the temperature in degree celcius">
            <button class="btn btn-outline-dark btn-sm w-100 my-3" onclick="checkCategory()">Check the Category</button>
            <div id="category"></div>
      </div>
</body>
<script>
      function checkCategory() {
            if (temperature.value == '') {
                  // alert('input cannot be empty')
                  errorMsg.style.display = 'block'
                  category.style.display = 'none'

            } else {
                  errorMsg.style.display = 'none'
                  category.style.display = 'block'
                  let temp = Number(temperature.value)
                  if (temp < 20) {
                        // console.log('Cold');
                        category.innerHTML = ''
                        category.innerHTML = `<p>The temperature is Cold</p>`
                  } else if (temp >= 20 && temp <= 28) {
                        category.innerHTML = `<p>The temperature  is Warm</p>`
                  } else {
                        category.innerHTML = ''
                        category.innerHTML = `<p>The temperature is Hot</p>`
                  }

            }
      }
</script>

</html>
