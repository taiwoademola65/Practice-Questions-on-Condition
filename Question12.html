<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INEC Voting Eligibility Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="col-lg-5 col-md-7 col-9 mx-auto p-lg-5 p-3 border-3 shadow mt-lg-5 mt-3">
    <h3 class="text-center">INEC Voting Eligibility Checker</h3>
    <div id="errorMsg" style="display: none;" class="alert alert-danger text-center p-2 fw-bold fs-6">input cannot
      be
      empty</div>
    <input class="form-control form-conntrol-sm shadow-none my-2" type="number" placeholder="Enter your year of birth"
      id="userDate">
    <button class="btn btn-outline-dark btn-sm w-100 my-3" onclick="checkEli()">Check eligibility</button>
    <div id="showInfo">Result will show here</div>
  </div>
</body>
<script>
  function checkEli() {
    if (userDate.value == '') {
      alert('input cannot be empty')
      errorMsg.style.display = 'block'
    } else {
      const yearOfBirth = Number(userDate.value)
      const currentYear = new Date().getFullYear();
      const age = currentYear - yearOfBirth
      if (age >= 18) {
        showInfo.innerHTML = ''
        showInfo.innerHTML = `<div class="alert alert-success  text-center p-2 fw-bold fs-6">congrats, vote dey go</div>`
      } else {
        showInfo.innerHTML = ''
        showInfo.innerHTML = `<div class="alert alert-secondary  text-center p-2 fw-bold fs-6">sorry, grow up fast. You have ${18 - age} years until you can vote</div>`
      }
    }
  }

</script>

</html>
